<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JDS Cloud — Registrieren</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/main.css">
</head>
<body class="auth-body">

<div class="auth-card">
  <a href="{% url 'index' %}" class="auth-logo">
    <span class="logo-icon">☁</span>
    <span class="logo-text">JDS<strong>Cloud</strong></span>
  </a>
  <h2 class="auth-title">Account erstellen</h2>

  <form method="post" class="auth-form">
    {% csrf_token %}
    {% for field in form %}
    <div class="form-group">
      <label for="{{ field.id_for_label }}">{{ field.label }}</label>
      {{ field }}
      {% if field.errors %}
      <ul class="field-errors">
        {% for e in field.errors %}<li>{{ e }}</li>{% endfor %}
      </ul>
      {% endif %}
      {% if field.help_text %}
      <small class="field-help">{{ field.help_text }}</small>
      {% endif %}
    </div>
    {% endfor %}
    <button type="submit" class="btn btn-primary btn-full">Account erstellen</button>
  </form>

  <p class="auth-switch">Schon registriert? <a href="{% url 'login' %}">Anmelden</a></p>
</div>

</body>
</html>
