<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JDS Cloud — Anmelden</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    /* ── CSS Reset & Base ─────────────────────────────────────── */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #6366f1;
      --primary-dark: #4f46e5;
      --primary-light: #818cf8;
      --bg: #0f172a;
      --surface: #1e293b;
      --surface-light: #334155;
      --text: #f8fafc;
      --text-muted: #94a3b8;
      --accent: #22d3ee;
      --success: #10b981;
      --error: #ef4444;
      --border: rgba(148, 163, 184, 0.1);
      --shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      --radius: 16px;
      --radius-sm: 8px;
    }

    body {
      font-family: 'Syne', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ── Auth Layout ─────────────────────────────────────────── */
    .auth-body {
      background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .auth-body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: 
        radial-gradient(circle at 20% 50%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(34, 211, 238, 0.1) 0%, transparent 50%),
        radial-gradient(circle at 40% 20%, rgba(168, 85, 247, 0.1) 0%, transparent 50%);
      pointer-events: none;
    }

    /* ── Auth Card ───────────────────────────────────────────── */
    .auth-card {
      position: relative;
      z-index: 10;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2.5rem;
      width: 100%;
      max-width: 420px;
      box-shadow: var(--shadow);
      animation: slideUp 0.6s ease;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ── Logo ────────────────────────────────────────────────── */
    .auth-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      font-size: 1.5rem;
      font-weight: 700;
      text-decoration: none;
      color: var(--text);
      margin-bottom: 1.5rem;
    }

    .logo-icon {
      font-size: 2rem;
      filter: drop-shadow(0 0 20px rgba(99, 102, 241, 0.5));
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    .logo-text {
      letter-spacing: -0.02em;
    }

    .logo-text strong {
      color: var(--primary-light);
      font-weight: 800;
    }

    /* ── Title ───────────────────────────────────────────────── */
    .auth-title {
      font-size: 1.75rem;
      font-weight: 700;
      text-align: center;
      margin-bottom: 1.5rem;
      color: var(--text);
    }

    /* ── Auth Error ──────────────────────────────────────────── */
    .auth-error {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      border-radius: var(--radius-sm);
      padding: 1rem;
      margin-bottom: 1.5rem;
      color: var(--error);
      font-size: 0.875rem;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      animation: shake 0.5s ease;
    }

    .auth-error::before {
      content: '⚠';
      font-size: 1rem;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }

    /* ── Form ────────────────────────────────────────────────── */
    .auth-form {
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .form-group label {
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--text);
    }

    .form-group input {
      padding: 0.875rem 1rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      font-size: 0.9375rem;
      transition: all 0.2s;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
    }

    .form-group input::placeholder {
      color: var(--text-muted);
    }

    /* ── Buttons ─────────────────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.875rem 1.5rem;
      border-radius: var(--radius-sm);
      font-family: 'Syne', sans-serif;
      font-size: 0.9375rem;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      border: none;
      position: relative;
      overflow: hidden;
    }

    .btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      transition: left 0.5s;
    }

    .btn:hover::before {
      left: 100%;
    }

    .btn-primary {
      background: var(--primary);
      color: white;
      box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
    }

    .btn-primary:hover {
      background: var(--primary-dark);
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(99, 102, 241, 0.6);
    }

    .btn-full {
      width: 100%;
      margin-top: 0.5rem;
    }

    /* ── Auth Switch ─────────────────────────────────────────── */
    .auth-switch {
      text-align: center;
      margin-top: 1.5rem;
      color: var(--text-muted);
      font-size: 0.9375rem;
    }

    .auth-switch a {
      color: var(--primary-light);
      text-decoration: none;
      font-weight: 600;
      position: relative;
    }

    .auth-switch a::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      width: 0;
      height: 2px;
      background: var(--primary);
      transition: width 0.3s;
    }

    .auth-switch a:hover::after {
      width: 100%;
    }

    /* ── Responsive ──────────────────────────────────────────── */
    @media (max-width: 480px) {
      .auth-body {
        padding: 1rem;
      }

      .auth-card {
        padding: 1.5rem;
      }

      .auth-title {
        font-size: 1.5rem;
      }
    }

    /* ── Scrollbar Styling ─────────────────────────────────── */
    ::-webkit-scrollbar {
      width: 10px;
    }

    ::-webkit-scrollbar-track {
      background: var(--bg);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--surface-light);
      border-radius: 5px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--primary);
    }
  </style>
</head>
<body class="auth-body">

<div class="auth-card">
  <a href="{% url 'index' %}" class="auth-logo">
    <span class="logo-icon">☁</span>
    <span class="logo-text">JDS<strong>Cloud</strong></span>
  </a>
  <h2 class="auth-title">Willkommen zurück</h2>

  {% if form.errors %}
  <div class="auth-error">Falscher Benutzername oder Passwort.</div>
  {% endif %}

  <form method="post" class="auth-form">
    {% csrf_token %}
    <div class="form-group">
      <label for="id_username">Benutzername</label>
      <input type="text" name="username" id="id_username" autofocus autocomplete="username" required>
    </div>
    <div class="form-group">
      <label for="id_password">Passwort</label>
      <input type="password" name="password" id="id_password" autocomplete="current-password" required>
    </div>
    <button type="submit" class="btn btn-primary btn-full">Anmelden</button>
  </form>

  <p class="auth-switch">Noch kein Account? <a href="{% url 'register' %}">Registrieren</a></p>
</div>

</body>
</html>
